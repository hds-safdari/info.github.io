<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <meta name="theme-color" content="#0f766e">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <header class="site-header">
      <nav class="nav-wrap" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}">
          <span class="brand-mark">HS</span>
          <span>
            <strong>{{ site.title }}</strong>
            <small>Statistical physics · Networks · Bayesian modeling</small>
          </span>
        </a>

        <div class="nav-links">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active" aria-current="page"{% endif %}>Home</a>
          <a href="{{ '/pub.html' | relative_url }}" {% if page.url contains 'pub' %}class="active" aria-current="page"{% endif %}>Projects &amp; Publications</a>
          <a href="{{ '/Safdari_CV.pdf' | relative_url }}">CV</a>
        </div>
      </nav>
    </header>

    <main id="content" class="page-shell">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div>
        <strong>{{ site.title }}</strong><br>
        <span>Interdisciplinary research on complex systems, network inference, and dynamical biological systems.</span>
      </div>
      <div class="footer-links">
        <a href="https://scholar.google.com/citations?user=H-9OPuIAAAAJ&hl=en">Google Scholar</a>
        <a href="https://linkedin.com/in/hadiseh-safdari-238540153">LinkedIn</a>
        <a href="https://github.com/hds-safdari">GitHub</a>
      </div>
    </footer>
  </body>
</html>
